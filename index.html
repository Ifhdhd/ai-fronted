<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        h2 {
            text-align: center;
            padding: 10px;
            background: #020617;
            margin: 0;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .msg {
            margin: 10px 0;
            max-width: 70%;
            padding: 10px;
            border-radius: 10px;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
            margin-left: auto;
        }

        .ai {
            background: #1e293b;
            align-self: flex-start;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #020617;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #22c55e;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>🤖 AI Assistant</h2>

<div id="chat"></div>

<div id="inputArea">
    <input type="text" id="input" placeholder="Ketik pesan..." />
    <button onclick="send()">Kirim</button>
</div>

<script src="script.js"></script>

</body>
</html>
